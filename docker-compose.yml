services:
  db:
    image: postgres:16-alpine
    container_name: bolao-db
    environment:
      POSTGRES_USER: bolao
      POSTGRES_PASSWORD: bolao
      POSTGRES_DB: bolao
    volumes:
      - bolao-db-data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bolao"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  server:
    build: ./server
    container_name: bolao-server
    environment:
      DATABASE_URL: postgresql://bolao:bolao@db:5432/bolao
      PORT: "4000"
      APP_URL: ${APP_URL:-http://localhost:8080}
      # Credencial de admin — ver .env.example. Sem isso, uma senha aleatória
      # é gerada e só aparece no log do container (docker compose logs server).
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      # E-mail: Resend (preferido) > SMTP genérico > console (ver server/src/mailer.ts).
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      # Sem valor aqui de propósito — o mailer escolhe um remetente padrão
      # sensato sozinho (resend.dev de teste ou bolao.local) conforme o que
      # estiver configurado. Ver server/src/mailer.ts.
      EMAIL_FROM: ${EMAIL_FROM:-}
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  web:
    build:
      context: ./web
      args:
        VITE_API_URL: ""
    container_name: bolao-web
    ports:
      - "8080:80"
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

volumes:
  bolao-db-data:
